# 每4小时自动拉取一次 The Odds API 的实时赔率与真实赛果并提交，
# 配合托管平台的推送自动重新部署，使线上页面无需手动操作即可更新。
name: Sync live data

on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - run: npm install

      - run: npm run data:odds:live
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}

      - run: npm run data:results:live
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}

      - name: Commit updated live data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/odds-live.json public/data/results-live.json
          git diff --cached --quiet || git commit -m "chore: refresh live odds and results data"
          git push
