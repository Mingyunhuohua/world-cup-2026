# 每4小时自动拉取一次The Odds API实时赔率并提交，配合托管平台的推送自动重新部署。
name: Sync live odds

on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - run: npm install

      - run: npm run data:odds:live
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}

      - name: Commit updated odds file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/odds-live.json
          git diff --cached --quiet || git commit -m "chore: refresh live odds data"
          git push
